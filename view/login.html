<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Login - Express Demo</title>
   <link rel="stylesheet" href="/css/login.css" />
</head>

<body>
   <header class="topbar">
      <div class="brand">
         <span class="logo-mark">amazon</span>
      </div>
      <nav>
         <a href="#">Need help?</a>
      </nav>
   </header>

   <main class="page-wrapper">
      <section class="login-panel">
         <div class="login-header">
            <h1>Sign in</h1>
            <p>Login to continue to your account</p>
         </div>

         <div class="login-body">
            <form id="loginForm" action="/submit" method="post">
               <div class="input-group">
                  <label for="username">Email or mobile phone number</label>
                  <input type="text" id="username" name="username" placeholder="Enter your email or mobile number" required />
               </div>

               <div class="input-group toggle-password">
                  <label for="password">Password</label>
                  <input type="password" id="password" name="password" placeholder="Enter your password" required />
                  <button type="button" id="togglePassword" class="toggle-password-icon">Show</button>
               </div>

               <button class="login-button" type="submit">Continue</button>
            </form>

            <div class="login-footer">
               <p>By continuing, you agree to Amazon's <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.</p>
            </div>
         </div>

         <div class="other-actions">
            <div class="separator"></div>
            <p>New to Amazon?</p>
            <a href="/register">Create your Amazon account</a>
         </div>
      </section>
   </main>

   <script>
      const togglePassword = document.getElementById('togglePassword');
      const passwordField = document.getElementById('password');

      togglePassword.addEventListener('click', function () {
         const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
         passwordField.setAttribute('type', type);
         this.textContent = type === 'password' ? 'Show' : 'Hide';
      });

      document.getElementById('loginForm').addEventListener('submit', function (e) {
         if (!passwordField.value || !document.getElementById('username').value) {
            alert('Please fill in all fields');
            e.preventDefault();
         }
      });
   </script>
</body>

</html>
